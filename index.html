<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱的频率测试</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:linear-gradient(135deg,#f6ebe7,#f4f1ef);
color:#4b3a34;
}

.container{
max-width:720px;
margin:auto;
padding:30px;
}

.card{
background:white;
border-radius:24px;
padding:35px;
box-shadow:0 25px 60px rgba(0,0,0,0.08);
}

h1{
text-align:center;
font-size:34px;
}

.subtitle{
text-align:center;
color:#8b6f63;
margin-bottom:20px;
}

button{
background:#c98f6f;
color:white;
border:none;
padding:14px 28px;
border-radius:14px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.type-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:25px;
}

.type-card{
background:#faf7f6;
padding:14px;
border-radius:12px;
text-align:center;
font-size:14px;
}

.progress{
height:8px;
background:#eee;
border-radius:6px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
background:#c98f6f;
width:0%;
}

.option{
border:1px solid #eee;
padding:14px;
border-radius:12px;
margin:10px 0;
cursor:pointer;
}

.option:hover{
background:#faf7f6;
}

.nav{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.result-title{
text-align:center;
font-size:26px;
margin-bottom:15px;
}

.result-text{
line-height:1.8;
white-space:pre-line;
}

</style>

</head>

<body>

<div class="container">

<!-- start -->

<div id="startPage" class="card">

<h1>你用什么频率<br>发出爱的信号？</h1>

<div class="subtitle">LOVE FREQUENCY TEST</div>

<p style="text-align:center;line-height:1.8">
每个人都在爱，但爱的方式却大不相同。
</p>

<div class="type-grid">

<div class="type-card">🌸语言共鸣</div>
<div class="type-card">🕯时刻共享</div>
<div class="type-card">🧺行动守护</div>
<div class="type-card">🎀用心仪式</div>
<div class="type-card">💞亲密触感</div>

</div>

<div style="text-align:center;margin-top:30px">
<button onclick="startTest()">开始测试</button>
</div>

</div>

<!-- quiz -->

<div id="quizPage" style="display:none">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="card">

<h2 id="question"></h2>

<div id="options"></div>

<div class="nav">

<button onclick="prevQuestion()">上一题</button>

<div id="qIndex"></div>

</div>

</div>

</div>

<!-- result -->

<div id="resultPage" style="display:none">

<div class="card">

<div class="result-title" id="resultTitle"></div>

<div class="result-text" id="resultText"></div>

</div>

</div>

</div>

<script>

let index=0

let answers=[]

let score={
A:0,B:0,C:0,D:0,E:0
}

const questions=[

{
q:"加班到深夜回家，你最想看到的是",
o:[
["静静陪你坐一会","B"],
["温着一碗热汤面","C"],
["写满暖心话的便签","D"],
["一个紧紧拥抱","E"]
]
},

{
q:"情绪突然低落，对方怎么做最能治愈你",
o:[
["说我懂你的委屈","A"],
["推掉事情陪你","B"],
["默默把事情做好","C"],
["轻轻牵你的手","E"]
]
}

]

function startTest(){

document.getElementById("startPage").style.display="none"
document.getElementById("quizPage").style.display="block"

renderQuestion()

}

function renderQuestion(){

let q=questions[index]

document.getElementById("question").innerText=
"Q"+(index+1)+" · "+q.q

let html=""

q.o.forEach(o=>{

html+=`<div class="option" onclick="choose('${o[1]}')">${o[0]}</div>`

})

document.getElementById("options").innerHTML=html

document.getElementById("qIndex").innerText=
(index+1)+"/"+questions.length

document.getElementById("progressBar").style.width=
(index/questions.length)*100+"%"

}

function choose(type){

answers[index]=type

score[type]++

index++

if(index<questions.length){

renderQuestion()

}else{

showResult()

}

}

function prevQuestion(){

if(index===0)return

index--

let type=answers[index]

score[type]--

renderQuestion()

}

function showResult(){

document.getElementById("quizPage").style.display="none"

document.getElementById("resultPage").style.display="block"

let sorted=Object.entries(score).sort((a,b)=>b[1]-a[1])

let main=sorted[0][0]

let sub=sorted[1][0]

const types={
A:"🌸语言共鸣型",
B:"🕯时刻共享型",
C:"🧺行动守护型",
D:"🎀用心仪式型",
E:"💞亲密触感型"
}

document.getElementById("resultTitle").innerText=
types[main]+" × "+types[sub]

document.getElementById("resultText").innerText=
descriptions[main]+"\n\n副频率："+types[sub]

}

const descriptions={

A:`🌸语言共鸣型
你是亲密关系里的诗人...`,

B:`🕯时刻共享型
你认为爱不是说出来的...`,

C:`🧺行动守护型
你的爱藏在每一个我来吧里...`,

D:`🎀用心仪式型
你相信细节是爱最真实的证据...`,

E:`💞亲密触感型
对你来说肌肤接触是最直接的语言...`

}

</script>

</body>
</html>
