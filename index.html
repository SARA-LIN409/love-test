<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱的频率 · 亲密联结风格测试</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
padding:40px 20px;
background:linear-gradient(135deg,#fdf6f8,#f6f0ff);
}

.container{
max-width:720px;
margin:auto;
background:white;
padding:40px;
border-radius:24px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h1{
text-align:center;
font-size:28px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:30px;
}

.question{
margin-bottom:28px;
}

.question p{
font-weight:600;
margin-bottom:10px;
}

label{
display:block;
margin-bottom:8px;
cursor:pointer;
}

button{
width:100%;
padding:14px;
background:#222;
color:white;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.result{
display:none;
margin-top:40px;
}

.card{
background:white;
border-radius:24px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
background:linear-gradient(160deg,#ffffff,#fff6fb);
}

.card h2{
margin-top:0;
font-size:22px;
}

.tag{
margin-top:20px;
font-size:18px;
font-weight:600;
}

.footer{
margin-top:20px;
font-size:14px;
color:#888;
text-align:center;
}
</style>
</head>

<body>

<div class="container">
<h1>🌸 爱的频率 · 亲密联结风格测试</h1>
<div class="subtitle">测测你在亲密关系中的联结方式</div>

<form id="quizForm">

<script>
const questions = [
["加班到深夜回家，你最想看到的是：",
["静静陪你坐一会儿","B"],
["温着你爱吃的热汤面","C"],
["手写暖心便签","D"],
["一个紧紧的拥抱","E"]],

["情绪突然低落，对方怎么做最能治愈你？",
["说“我懂你的委屈”","A"],
["推掉事情专心陪你","B"],
["默默替你收拾好一切","C"],
["轻轻牵手或摸头","E"]],

["异地久别重逢，你最想做的是：",
["彻夜聊天","A"],
["窝在一起发呆","B"],
["带你吃顿好的","C"],
["紧紧拥抱","E"]],

["哪句话最能让你瞬间被充电？",
["你在我心里最特别","A"],
["走，带你去想去的地方","B"],
["这件事交给我","C"],
["偷偷实现你的小心愿","D"]],

["你心中最动人的浪漫画面是：",
["交换只属于两人的秘密","A"],
["替你包揽不擅长的事","C"],
["记住你所有喜好准备惊喜","D"],
["在人群中牵紧你的手","E"]],

["哪个小细节最让你心动？",
["记得你想看的电影","B"],
["生病时递药和热水","C"],
["悄悄买来你提过的小东西","D"],
["看剧时自然搂着你","E"]],

["你最享受的二人时光是：",
["深度聊天","A"],
["一起做日常小事","B"],
["精心策划的小约会","D"],
["腻在一起贴贴","E"]],

["在热闹聚会场合，对方怎么做最让你安心？",
["朋友圈晒你们的走心合照","A"],
["目光始终在你身上","B"],
["准备小惊喜安排","D"],
["桌下悄悄握住你的手","E"]],

["理想纪念日你最希望：",
["写满真心话的信","A"],
["替你处理焦虑的事","C"],
["记得你念叨很久的东西","D"],
["长时间亲密相处","E"]],

["当你们都老了，你觉得最动人的爱是：",
["每天依然说我爱你","A"],
["一起晒太阳聊天","B"],
["依然为你做饭","C"],
["每年生日认真准备","D"]]
];

questions.forEach((q,i)=>{
document.write(`<div class="question"><p>Q${i+1}. ${q[0]}</p>`);
for(let j=1;j<=4;j++){
document.write(`<label><input type="radio" name="q${i}" value="${q[j][1]}" required> ${q[j][0]}</label>`);
}
document.write("</div>");
});
</script>

<button type="submit">查看我的爱的频率</button>
</form>

<div id="result" class="result"></div>

</div>

<script>
const typeNames={
A:"🌸 语言共鸣型",
B:"🕯 时刻共享型",
C:"🧺 行动守护型",
D:"🎀 用心仪式型",
E:"💞 亲密触感型"
};

document.getElementById("quizForm").addEventListener("submit",function(e){
e.preventDefault();

let scores={A:0,B:0,C:0,D:0,E:0};

for(let i=0;i<questions.length;i++){
let val=document.querySelector(`input[name="q${i}"]:checked`).value;
scores[val]++;
}

let sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
let main=sorted[0][0];
let sub=sorted[1][0];

document.getElementById("result").style.display="block";
document.getElementById("result").innerHTML=`
<div class="card">
<h2>${typeNames[main]} × ${typeNames[sub]}</h2>
<p>你的爱，更像一种独特的频率组合。你通过 <strong>${typeNames[main]}</strong> 的方式建立连接，同时也会在 <strong>${typeNames[sub]}</strong> 的时刻感到格外安心。</p>
<div class="tag">🌿 爱不是完美匹配，而是互相翻译。</div>
<div class="footer">截图保存，和TA对照看看吧 💖</div>
</div>
`;
});
</script>

</body>
</html>
