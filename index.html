<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爱的频率 · 亲密联结风格测试</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
background:linear-gradient(135deg,#f8ebe6,#f3f0ef);
color:#463933;
overflow-x:hidden;
}

.container{
max-width:760px;
margin:auto;
padding:30px 20px 60px;
}

.card{
background:white;
border-radius:26px;
padding:34px;
box-shadow:0 30px 80px rgba(0,0,0,0.08);
animation:fade .4s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

h1{
font-size:34px;
text-align:center;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#9c8478;
margin-bottom:30px;
}

.type-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:30px;
}

.type{
background:#faf7f6;
padding:14px;
border-radius:12px;
text-align:center;
font-size:14px;
}

.start-btn{
display:block;
margin:auto;
background:#c98f6f;
color:white;
border:none;
padding:16px 32px;
border-radius:16px;
font-size:18px;
cursor:pointer;
}

.progress{
height:8px;
background:#eee;
border-radius:10px;
margin-bottom:26px;
overflow:hidden;
}

.bar{
height:100%;
background:#c98f6f;
width:0%;
transition:.3s;
}

.question{
font-size:22px;
margin-bottom:20px;
}

.option{
border:1px solid #eee;
border-radius:12px;
padding:16px;
margin-bottom:12px;
cursor:pointer;
transition:.2s;
}

.option:hover{
background:#faf7f6;
transform:scale(1.01);
}

.nav{
display:flex;
justify-content:space-between;
margin-top:16px;
}

.nav button{
border:none;
background:#eee;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
}

.result-title{
font-size:28px;
text-align:center;
margin-bottom:20px;
}

.section{
margin-top:22px;
line-height:1.85;
white-space:pre-line;
}

.decor{
position:fixed;
font-size:26px;
opacity:.12;
pointer-events:none;
}

.decor1{top:80px;left:40px}
.decor2{top:200px;right:60px}
.decor3{bottom:120px;left:60px}
.decor4{bottom:200px;right:40px}

</style>
</head>

<body>

<div class="decor decor1">🌸</div>
<div class="decor decor2">💗</div>
<div class="decor decor3">✨</div>
<div class="decor decor4">🎀</div>

<div class="container">

<!-- START PAGE -->

<div id="start">

<div class="card">

<h1>你用什么频率<br>发出爱的信号？</h1>

<div class="subtitle">
LOVE FREQUENCY TEST
</div>

<div class="type-grid">

<div class="type">🌸语言共鸣型</div>
<div class="type">🕯时刻共享型</div>
<div class="type">🧺行动守护型</div>
<div class="type">🎀用心仪式型</div>
<div class="type">💞亲密触感型</div>

</div>

<p style="text-align:center;line-height:1.8;margin-bottom:26px">

每个人都在爱，但爱的方式却不同。  
完成10道题，看看你在亲密关系中的爱的频率。

</p>

<button class="start-btn" onclick="startTest()">开始测试</button>

</div>

</div>

<!-- QUIZ -->

<div id="quiz" style="display:none">

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="card">

<div class="question" id="q"></div>

<div id="options"></div>

<div class="nav">

<button onclick="prev()">上一题</button>

<div id="index"></div>

</div>

</div>

</div>

<!-- RESULT -->

<div id="result" style="display:none">

<div class="card">

<div class="result-title" id="title"></div>

<div class="section" id="analysis"></div>

<div class="section" id="mainDesc"></div>

<div class="section" id="subDesc"></div>

<div class="section" style="text-align:center;color:#999;margin-top:30px">
截图分享给TA看看吧 💖
</div>

</div>

</div>

</div>

<script>

let current=0

let answers=[]

let score={A:0,B:0,C:0,D:0,E:0}

const types={
A:"🌸语言共鸣型",
B:"🕯时刻共享型",
C:"🧺行动守护型",
D:"🎀用心仪式型",
E:"💞亲密触感型"
}

const questions=[

{q:"加班到深夜回家，你最想看到的是",
o:[
["对方放下手机陪你坐一会","B"],
["温着一碗热汤面","C"],
["写满暖心话的便签","D"],
["一个紧紧拥抱","E"]
]},

{q:"情绪低落时，对方怎样最治愈你",
o:[
["说我懂你的委屈","A"],
["推掉事情陪你","B"],
["默默把事情做好","C"],
["轻轻牵你的手","E"]
]},

{q:"异地重逢时最想做",
o:[
["彻夜聊天","A"],
["窝在一起发呆","B"],
["带你吃顿好的","C"],
["紧紧拥抱","E"]
]},

{q:"哪句话最让你充满电",
o:[
["你永远特别","A"],
["走带你去想去的地方","B"],
["这件事交给我","C"],
["我帮你实现小心愿","D"]
]},

{q:"最动人的浪漫",
o:[
["交换秘密","A"],
["默默替你搞定难题","C"],
["记住所有小喜好","D"],
["在人群中牵手","E"]
]}

]

function startTest(){

document.getElementById("start").style.display="none"
document.getElementById("quiz").style.display="block"

render()

}

function render(){

let q=questions[current]

document.getElementById("q").innerText="Q"+(current+1)+" · "+q.q

let html=""

q.o.forEach(o=>{

html+=`<div class="option" onclick="choose('${o[1]}')">${o[0]}</div>`

})

document.getElementById("options").innerHTML=html

document.getElementById("index").innerText=(current+1)+"/"+questions.length

document.getElementById("bar").style.width=(current/questions.length)*100+"%"

}

function choose(t){

answers[current]=t
score[t]++

current++

if(current<questions.length){

render()

}else{

showResult()

}

}

function prev(){

if(current==0)return

current--

let t=answers[current]

score[t]--

render()

}

function showResult(){

document.getElementById("quiz").style.display="none"
document.getElementById("result").style.display="block"

let sorted=Object.entries(score).sort((a,b)=>b[1]-a[1])

let main=sorted[0][0]
let sub=sorted[1][0]

document.getElementById("title").innerText=
types[main]+" × "+types[sub]

document.getElementById("analysis").innerText=
`你的爱的表达更接近 ${types[main]} ，
同时也带着 ${types[sub]} 的特质。

你既通过这种方式表达爱，
也更容易通过这种方式感受到被爱。`

document.getElementById("mainDesc").innerText=descriptions[main]

document.getElementById("subDesc").innerText="你的第二频率："+types[sub]+"\n\n"+descriptions[sub]

}

const descriptions={

A:`🌸语言共鸣型
你是亲密关系里的诗人...`,

B:`🕯时刻共享型
你认为爱不是说出来的，而是在一起本身...`,

C:`🧺行动守护型
你的爱藏在每一个我来吧里...`,

D:`🎀用心仪式型
你相信细节是爱的证据...`,

E:`💞亲密触感型
触碰是你最直接的情感语言...`

}

</script>

</body>
</html>
